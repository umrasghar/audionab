name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Run tests
        run: |
          pip install -r requirements-dev.txt
          pytest tests/ -v --tb=short

      - name: Download FFmpeg
        run: python scripts/download_ffmpeg.py --output-dir ffmpeg

      - name: Generate app icons
        run: python scripts/generate_icon.py

      - name: Build exe with Nuitka
        run: |
          python -m nuitka ^
            --standalone ^
            --onefile ^
            --windows-console-mode=disable ^
            --enable-plugin=tk-inter ^
            --include-package=customtkinter ^
            --include-package-data=customtkinter ^
            --include-package=windnd ^
            --include-package=pystray ^
            --include-package=PIL ^
            --include-package=watchdog ^
            --include-package=httpx ^
            --include-package=httpcore ^
            --include-package=h11 ^
            --include-package=anyio ^
            --include-package=sniffio ^
            --include-package=certifi ^
            --include-package=idna ^
            --include-package=audionab ^
            --include-data-dir=audionab=audionab ^
            --include-data-dir=assets=assets ^
            --include-data-files=ffmpeg/ffmpeg.exe=ffmpeg/ffmpeg.exe ^
            --include-data-files=ffmpeg/ffprobe.exe=ffmpeg/ffprobe.exe ^
            --output-dir=dist ^
            --output-filename=AudioNab.exe ^
            --windows-icon-from-ico=assets/icon.ico ^
            --remove-output ^
            --assume-yes-for-downloads ^
            --company-name=AudioNab ^
            --product-name=AudioNab ^
            --product-version=2.5.0 ^
            --file-description="AudioNab - Lightweight Audio Extractor" ^
            audionab.py
        shell: cmd

      - name: Verify build output
        run: |
          if (Test-Path "dist\AudioNab.exe") {
            $size = (Get-Item "dist\AudioNab.exe").Length / 1MB
            Write-Host "AudioNab.exe built successfully: $([math]::Round($size, 1)) MB"
          } else {
            Write-Error "Build failed: dist\AudioNab.exe not found"
            exit 1
          }
        shell: pwsh

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: installer.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AudioNab-${{ github.ref_name }}
          path: |
            dist/AudioNab.exe
            installer_output/*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/AudioNab.exe
            installer_output/*.exe
          generate_release_notes: true
